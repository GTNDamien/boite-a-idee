<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boîte à Idées</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script>
    // Applique le thème avant le rendu pour éviter tout flash visuel
    (function () {
      var saved = localStorage.getItem("theme");
      if (saved === "light") document.documentElement.dataset.themeReady = "light";
    })();
  </script>
</head>
<body>

  <div class="container">

    <header class="hero">
      <div class="hero-text">
        <div class="hero-tag">Participatif — ouvert à tous</div>
        <h1>
          La boîte à idées
          <span class="underline">
            <svg width="280" height="10" viewBox="0 0 280 10" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 6C40 2 90 8 140 5C190 2 240 7 278 4" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </span>
        </h1>
        <p>Chaque idée peut améliorer l'événement. Partage la tienne et vote pour celles qui t'inspirent.</p>
      </div>
      <div class="hero-right">
        <button id="themeToggle" class="theme-toggle" aria-label="Changer de thème">
          <svg id="themeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <span id="themeLabel">Mode clair</span>
        </button>
        <div class="hero-stats" id="heroStats">
          <div class="stat-stamp">
            <span class="stat-number" id="statIdeas">—</span>
            <span class="stat-label">idées</span>
          </div>
          <div class="stat-stamp">
            <span class="stat-number" id="statVotes">—</span>
            <span class="stat-label">votes</span>
          </div>
        </div>
      </div>
    </header>

    <div class="toolbar">
      <div id="categories"></div>
      <div class="sort-controls">
        <span class="sort-label">Trier par</span>
        <div class="sort-buttons">
          <button class="sort-btn active" data-sort="popular" title="Plus populaires">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            Popularité
          </button>
          <button class="sort-btn" data-sort="newest" title="Plus récentes">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
            Plus récentes
          </button>
          <button class="sort-btn" data-sort="oldest" title="Plus anciennes">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Plus anciennes
          </button>
        </div>
      </div>
    </div>

    <div id="ideas"></div>

    <div id="emptyState" class="empty-state hidden">
      <div class="empty-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <p>Aucune idée dans cette catégorie pour l'instant.</p>
    </div>

  </div>

  <!-- MODAL -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="closeModal" class="close-btn" aria-label="Fermer">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
